name: Fuzz

on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * *"

permissions:
  contents: read

jobs:
  asan-fuzz-smoke:
    name: ASAN Fuzz Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz

      - name: Run fuzz_has (ASAN)
        working-directory: fuzz
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: cargo +nightly fuzz run fuzz_has --sanitizer address -- -max_total_time=90

      - name: Run fuzz_message_gets (ASAN)
        working-directory: fuzz
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: cargo +nightly fuzz run fuzz_message_gets --sanitizer address -- -max_total_time=90

      - name: Run fuzz_message_alloc (ASAN)
        working-directory: fuzz
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: cargo +nightly fuzz run fuzz_message_alloc --sanitizer address -- -max_total_time=90
